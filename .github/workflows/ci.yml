name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-test:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - name: Download modules
        run: go mod download
      - name: Run tests with race detector
        run: go test ./... -race -cover


  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1

  laravel-test:
    name: Laravel Tests (PHP 8.2)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: adapters/laravel
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: json, zip
          tools: composer:v2
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Run PHPUnit
        run: vendor/bin/phpunit

  django-test:
    name: Django Tests (Python 3.11)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: adapters/django
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"
      - name: Run pytest
        run: pytest -v
        env:
          PYTHONPATH: ${{ github.workspace }}/adapters/django

  fastapi-test:
    name: FastAPI Tests (Python 3.11)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: adapters/fastapi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package + dev dependencies
        run: pip install -e ".[dev]" fastapi httpx
      - name: Run pytest
        run: pytest -v


