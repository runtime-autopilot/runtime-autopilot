# https://golangci-lint.run/usage/configuration/
version: "2"

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - gofmt
    - goimports
    - misspell

linters-settings:
  goimports:
    local-prefixes: github.com/runtime-autopilot/runtime-autopilot

issues:
  exclude-rules:
    # Allow returning (nil, nil) in detection functions — this is intentional
    # to signal "no limit detected" without an error.
    - linters: [govet]
      text: "nilnil"
