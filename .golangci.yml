# https://golangci-lint.run/usage/configuration/
version: "2"

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - misspell
  settings:
    errcheck:
      check-blank: false
  exclusions:
    rules:
      - linters: [gosec]
        text: "G114"

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/runtime-autopilot/runtime-autopilot
