# https://golangci-lint.run/usage/configuration/
version: "2"

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - misspell

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/runtime-autopilot/runtime-autopilot

linters-settings:
  errcheck:
    check-blank: false

issues:
  exclude-rules:
    - linters: [gosec]
      text: "G114"
